# HCE authority for the webcam-gaze-accuracy scope (see ~/.claude/rules/evaluation.md).
# Splits are over ON-SCREEN TARGET POSITIONS, normalized [0,1], origin = top-left.
#   calibration -> fit the per-user feature->screen map
#   validation  -> the SEARCH SIGNAL, written to metrics.json (every skill reads this)
#   test        -> HELD OUT; read ONLY by the final-scoring pass (final_metrics.json).
#                  Do not read/list/sample test targets while developing methods.
# Changing these positions is a BREAKING change -> record in docs/decisions/.
