# Hard ceilings for autonomous runs. Chain halts when any is hit.
# Sized for a Max plan box running the latest Opus for both roles.
max_wall_hours: 24
max_tokens: 5000000
max_experiments: 20
max_consecutive_no_improvement: 3
max_disk_gb: 500

# Autonomy level. "standard" (default) = propose and wait for confirmation.
# "max" = fetch / ingest / propose / iterate autonomously while the
# coordinator's agency verdict permits and the ceilings above hold — use
# `claude-coordinator-agency` to gauge token + hardware headroom.
# See ~/.claude/rules/agency.md.
agency: max

# Model roles. Skills read these as the defaults; CLI flags override per-call.
# "opus" is a floating alias that resolves to the latest Opus release, so this
# tracks new Opus versions without edits. Pin a concrete slug (e.g.
# "claude-opus-4-8") for a specific role if you need reproducibility, or drop
# to "haiku"/"sonnet" for a cheaper implementer.
models:
  ideator: "opus"
  implementer: "opus"

# Hardware hints (read by /implement, surfaced to the subagent).
hardware:
  gpu_model: "NVIDIA RTX 5080"
  gpu_memory_gb: 16
  gpu_count: 1
  system_ram_gb: 64    # edit to match
  storage_path: "/mnt/projects"
  storage_free_gb: 3400
